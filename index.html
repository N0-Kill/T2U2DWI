<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Index Minimalista</title>
    <style>
        /* Reseteo básico */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            color: #333;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* Navegación */
        header {
            padding: 20px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-weight: bold;
            font-size: 24px;
            color: #2c3e50;
        }

        nav a {
            text-decoration: none;
            color: #666;
            margin-left: 20px;
            transition: color 0.3s;
        }

        nav a:hover {
            color: #2c3e50;
        }

        /* Contenido Principal */
        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 20px;
        }

        h1 {
            font-size: 48px;
            margin-bottom: 20px;
            color: #2c3e50;
        }

        p {
            font-size: 18px;
            color: #7f8c8d;
            max-width: 600px;
            margin-bottom: 30px;
            line-height: 1.6;
        }

        .btn {
            display: inline-block;
            padding: 12px 30px;
            background-color: #3498db;
            color: white;
            text-decoration: none;
            border-radius: 25px;
            font-weight: bold;
            transition: background 0.3s;
        }

        .btn:hover {
            background-color: #2980b9;
        }

        /* Pie de página */
        footer {
            text-align: center;
            padding: 20px;
            font-size: 14px;
            color: #95a5a6;
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">MiMarca</div>
        <nav>
            <a href="#">Inicio</a>
            <a href="#">Proyectos</a>
            <a href="#">Contacto</a>
        </nav>
    </header>

    <main>
        <h1>Menos es más.</h1>
        <p>Esta es una estructura limpia y elegante. Ideal para proyectos que necesitan un impacto visual rápido sin saturar al usuario.</p>
        <a href="#" class="btn">Empezar ahora</a>
    </main>

    <footer>
        <p>&copy; 2026 MiMarca. Hecho con simplicidad.</p>
    </footer>

</body>
</html>
